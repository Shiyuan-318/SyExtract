# SyExtract Configuration
# Author: Shiyuan
# Year: 2026

# 语言设置 / Language Settings
# 可选值 / Available values: zh (简体中文), en (English)
language: zh

# 红包设置
red-envelope:
  # 红包默认可领取时间（小时）
  default-expire-hours: 24
  # 最小红包金额
  min-amount: 1.0
  # 最小红包数量
  min-count: 1
  # 最大红包数量
  max-count: 100

# 手续费设置
fee:
  # 是否启用手续费
  enabled: true
  # 手续费比例 (0.0 - 1.0, 例如 0.05 = 5%)
  percentage: 0.05
  # 最低手续费
  min-fee: 1.0

# GUI设置
gui:
  # 红包物品材质
  item-material: "SUNFLOWER"

# 广播消息设置
broadcast:
  # 红包被领完的通知消息
  envelope-completed: "&6&l🎉 红包通知 &r&7标题为 &e{name} &7的红包被领完了，&6{player} &7是手气王，领到了 &e{amount} &7金币！"
